<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Animation with Messages and Music</title>
    <style>
        /* CSS styles */
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            background-color: #000; /* Black background for night sky effect */
            cursor: crosshair; /* Change cursor to indicate interactivity */
        }

        canvas {
            display: block;
        }

        /* Style for the music control button */
        #musicToggleBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
            z-index: 10; /* Ensure it's above the canvas */
            transition: background-color 0.3s, transform 0.1s;
        }

        #musicToggleBtn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        #musicToggleBtn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <audio id="backgroundMusic" src="background_music.mp3" loop preload="auto"></audio>

    <button id="musicToggleBtn">Play Music</button>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        // JavaScript code
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        const backgroundMusic = document.getElementById('backgroundMusic');
        const musicToggleBtn = document.getElementById('musicToggleBtn');

        // Set canvas to full screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const gravity = 0.05; // Adjust for stronger/weaker gravity

        // The messages to display
        const messages = ["KASONGE", "MOVEMENT", "#WELCOME", "ALL", "TOGETHER", "WE", "CAN", "TRANSFORM", "KENYA","RUTO MUST WIN"];
        let messageIndex = 0; // To cycle through the messages
        let musicPlaying = true; // Track music state

        // Function to draw text on the canvas
        function drawText(text, x, y) {
            ctx.font = 'bold 100px Arial, sans-serif'; // Increased font size here
            ctx.fillStyle = '#fff'; // White color for the text
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle'; // Center text vertically
            ctx.fillText(text, x, y);
            // Optional: Add a subtle glow/shadow to text for better contrast
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
            // Temporarily clear shadow to not affect other drawings in next frame
            setTimeout(() => {
                ctx.shadowBlur = 0;
            }, 50); // Small delay to ensure text is drawn with shadow
        }

        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1; // Opacity
                this.friction = 0.99; // Slow down particles over time
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += gravity; // Apply gravity

                this.alpha -= 0.01; // Fade out
            }
        }

        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`; // Random bright color
                this.velocity = { x: 0, y: Math.random() * -5 - 5 }; // Initial upward velocity
                this.particles = [];
                this.lifespan = 100; // Time before explosion
                this.hasExploded = false;
                // Assign a message from the array, cycling through them
                this.currentMessage = messages[(messageIndex++) % messages.length];
            }

            draw() {
                if (!this.hasExploded) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2, false);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            explode() {
                const explosionCount = 30; // Reduced particle count for better text visibility
                for (let i = 0; i < explosionCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3 + 1; // Reduced particle speed
                    const velocity = {
                        x: Math.cos(angle) * speed,
                        y: Math.sin(angle) * speed
                    };
                    this.particles.push(new Particle(this.x, this.y, this.color, velocity));
                }
                this.hasExploded = true;
                // Draw the message at the point of explosion
                drawText(this.currentMessage, this.x, this.y);
            }

            update() {
                if (!this.hasExploded) {
                    this.y += this.velocity.y;
                    this.velocity.y += gravity;

                    if (this.velocity.y >= 0) { // When firework starts falling, explode
                        this.explode();
                    }
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];
                    particle.update();
                    particle.draw();

                    if (particle.alpha <= 0.01) {
                        this.particles.splice(i, 1); // Remove faded particles
                    }
                }
            }
        }

        let fireworks = [];

        function animate() {
            requestAnimationFrame(animate);
            // Create a faint trail effect by drawing a semi-transparent black rectangle
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Randomly launch new fireworks
            if (Math.random() < 0.05) {
                fireworks.push(new Firework(Math.random() * canvas.width, canvas.height));
            }

            // Update and draw existing fireworks
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const firework = fireworks[i];
                firework.update();
                firework.draw();

                // Remove firework from array once its particles have faded out
                if (firework.particles.length === 0 && firework.hasExploded) {
                    fireworks.splice(i, 1);
                }
            }
        }

        // Start the animation loop
        animate();

        // --- Music Playback Logic ---

        // Function to play music
        function playMusic() {
            backgroundMusic.play().then(() => {
                musicPlaying = true;
                musicToggleBtn.textContent = 'Pause Music';
                console.log('Music started playing.');
            }).catch(error => {
                console.error('Autoplay prevented:', error);
                musicToggleBtn.textContent = 'Play Music (Click to enable)';
            });
        }

        // Function to pause music
        function pauseMusic() {
            backgroundMusic.pause();
            musicPlaying = false;
            musicToggleBtn.textContent = 'Play Music';
            console.log('Music paused.');
        }

        // Toggle music on button click
        musicToggleBtn.addEventListener('click', () => {
            if (musicPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        });

        // Optional: Play music on first user interaction with the canvas
        // This is often required by browsers for autoplay
        let firstInteraction = false;
        canvas.addEventListener('click', (event) => {
            if (!firstInteraction) {
                playMusic();
                firstInteraction = true;
            }
            // Also launch a firework on click
            fireworks.push(new Firework(event.clientX, event.clientY));
        });

        // Handle window resizing to keep canvas full screen
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Attempt to play music automatically on load (may be blocked by browser)
        // This line might trigger the "Autoplay prevented" error in modern browsers.
        // The click handler provides a fallback.
        // playMusic(); // Uncomment this if you want to try autoplay, but expect it might fail.
    </script>
</body>
</html>
